<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" id="logo-svg">
                <!-- Dark circular background -->
                <circle cx="200" cy="200" r="165" fill="#2d3748"/>
                
                <defs>
                    <!-- Glow effect -->
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
                        <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>
                
                <g transform="translate(200, 170)">
                    <!-- Top cube (yellow/orange) -->
                    <g transform="translate(0, -45) scale(0.85)">
                        <path d="M 0,-35 L 35,-17.5 L 0,0 L -35,-17.5 Z" fill="#F5B841" stroke="#F7C968" stroke-width="2" opacity="0.95" filter="url(#glow)"/>
                        <path d="M 35,-17.5 L 35,17.5 L 0,35 L 0,0 Z" fill="#E8874E" stroke="#CC6D3A" stroke-width="2" opacity="0.9"/>
                        <path d="M -35,-17.5 L -35,17.5 L 0,35 L 0,0 Z" fill="#ED9961" stroke="#D67A3D" stroke-width="2" opacity="0.9"/>
                    </g>
                    
                    <!-- Bottom right cube (orange/green) -->
                    <g transform="translate(50, 30) scale(0.85)">
                        <path d="M 0,-35 L 35,-17.5 L 0,0 L -35,-17.5 Z" fill="#E8874E" stroke="#ED9961" stroke-width="2" opacity="0.95" filter="url(#glow)"/>
                        <path d="M 35,-17.5 L 35,17.5 L 0,35 L 0,0 Z" fill="#52B788" stroke="#3A9B6E" stroke-width="2" opacity="0.9"/>
                        <path d="M -35,-17.5 L -35,17.5 L 0,35 L 0,0 Z" fill="#ED9961" stroke="#CC6D3A" stroke-width="2" opacity="0.9"/>
                    </g>
                    
                    <!-- Bottom left cube (blue/green) -->
                    <g transform="translate(-50, 30) scale(0.85)">
                        <path d="M 0,-35 L 35,-17.5 L 0,0 L -35,-17.5 Z" fill="#5A8AC6" stroke="#729FD4" stroke-width="2" opacity="0.95" filter="url(#glow)"/>
                        <path d="M 35,-17.5 L 35,17.5 L 0,35 L 0,0 Z" fill="#52B788" stroke="#3A9B6E" stroke-width="2" opacity="0.9"/>
                        <path d="M -35,-17.5 L -35,17.5 L 0,35 L 0,0 Z" fill="#6D9DC5" stroke="#4A7FA8" stroke-width="2" opacity="0.9"/>
                    </g>
                </g>
                
                <!-- Text - just "CUBIT" with Iosevka font -->
                <text x="200" y="295" font-family="'Iosevka', 'SF Mono', 'Consolas', monospace" font-size="48" font-weight="500" fill="#c8d0db" text-anchor="middle" letter-spacing="2">CUBIT</text>
                
                <!-- Subtle accent line -->
                <line x1="115" y1="305" x2="285" y2="305" stroke="#F5B841" stroke-width="2" opacity="0.3"/>
                <line x1="115" y1="305" x2="200" y2="305" stroke="#5A8AC6" stroke-width="2" opacity="0.4"/>
                <line x1="200" y1="305" x2="285" y2="305" stroke="#E8874E" stroke-width="2" opacity="0.4"/>
            </svg>